<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=20260330"
    />
    <link rel="stylesheet" href="../static/css/style.css?v=20260330" />
  </head>
  <body class="auth-page">
    <main
      class="container py-4 min-vh-100 d-flex align-items-center justify-content-center primary-yellow-bg"
    >
      <section class="auth-card card shadow-sm w-50 mx-auto primary-green-bg">
        <div class="card-body p-4 p-md-5">
          <nav class="nav nav-fill auth-tabs" aria-label="Authentication pages">
            <a class="nav-link active" href="login.html" aria-current="page"
              >Sign In</a
            >
            <a class="nav-link" href="signup.html">Sign Up</a>
          </nav>

          <h1 class="visually-hidden">Sign In</h1>

          <form class="d-grid gap-3" action="#" method="post">
            <div>
              <label class="form-label" for="login-identifier"
                >Email or Username</label
              >
              <input
                class="form-control form-control-lg"
                id="login-identifier"
                type="text"
                name="identifier"
                placeholder="Enter your email or username"
                autocomplete="username"
                required
              />
            </div>

            <div>
              <label class="form-label" for="login-password">Password</label>
              <input
                class="form-control form-control-lg"
                id="login-password"
                type="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
            </div>

            <p class="mb-0">
              <a class="text-decoration-none fw-semibold" href="#"
                >Forgot password?</a
              >
            </p>

            <button class="btn btn-lg w-100 auth-submit" type="submit">
              Sign In
            </button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
