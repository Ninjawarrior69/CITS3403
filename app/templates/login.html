<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=20260330"
    />
    <link rel="stylesheet" href="../static/css/style.css?v=20260330" />
  </head>
  <body class="auth-page">
    <main
      class="container py-5 min-vh-100 d-flex align-items-center justify-content-center"
    >
      <section class="auth-card card shadow-sm w-50 mx-auto">
        <div class="card-body p-4 p-md-5">
            <div class="heading">
                <h3><a href="home.html" style="font-family: 'Afacad';">BookWorm</a></h3>
                <p style="color:#6B5D56">Welcome back! Sign in to continue</p>
            </div><br>
          <nav class="nav nav-fill auth-tabs login-box" aria-label="Authentication pages">
            <a class="nav-link active signin-left" href="login.html" aria-current="page">Sign In</a>
            <a class="nav-link signin-right" href="signup.html">Sign Up</a>
          </nav>

          <h1 class="visually-hidden">Sign In</h1>
          <br>
          <form class="d-grid gap-3" action="#" method="post">
            <div>
              <label class="form-label" for="login-identifier">Email or Username</label>
              <input
                class="form-control w-100"
                id="login-identifier"
                type="text"
                name="identifier"
                placeholder="Enter your email or username"
                autocomplete="username"
                required
              />
            </div>
            <div class="mt-2">
              <label class="form-label" for="login-password">Password</label>
              <input
                class="form-control w-100"
                id="login-password"
                type="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
            </div>
            <div style="text-align: right">
                <a class="fw-semibold" href="#">Forgot password?</a>
            </div>
            <br>
            <button class="btn btn-primary btn-md w-100 auth-submit" type="submit">
              Sign In
            </button>
            <div style="text-align: center">
                <p>Don't have an account? <a class="fw-semibold" href="signup.html">Sign Up</a></p>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
