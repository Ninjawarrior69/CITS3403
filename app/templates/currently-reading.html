<!doctype html>
<html lang="en">
    <head>
        <title>My Books: Read</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
        />
        <link rel="stylesheet" href="../static/css/style.css" />
        <link rel="stylesheet" href="../static/css/mybooks.css" />
    </head>
    <body>
        {% include "navbar.html" %}

        <div class="container py-5">
            <h2>My Books</h2>
            <hr>
            <div class="col-md-12 d-flex gap-4">
                <a href="{{ url_for('read') }}">Read (102)</a>
                <a class="current-page" href="{{ url_for('currently_reading') }}">Currently Reading (3)</a>
                <a href="{{ url_for('to_be_read') }}">To Be Read (22)</a>
                <a href="{{ url_for('did_not_finish') }}">Did Not Finish (7)</a>
            </div>
            <hr><br>
            <!--- Book Progress Cards -->
            <div class="row g-4">
                <div class="col-md-6">
                <div class="row align-items-start rounded p-3 h-100">
                    <div class="col-4 text-center">
                        <div class="book-card"></div>
                    </div>
                    <div class="col-8">
                        <h5 class="mb-1">Alchemised</h5>
                        <p class="text-muted mb-4">Sen Lin Yu</p>
                        <div class="d-flex justify-content-between">
                            <p>Progress</p>
                            <p>33%</p>
                        </div>
                        <div class="progress">
                            <div class="progress-bar" style="width: 30%;"></div>
                        </div>
                        <p class="mt-2 text-muted" style="font-size: small;">Page 340 of 1040</p>
                        <button class="btn btn-primary btn-sm">Update Progress</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="row align-items-start rounded p-3 h-100">
                    <div class="col-4 text-center">
                        <div class="book-card"></div>
                    </div>
                    <div class="col-8">
                        <h5 class="mb-1">The Prison Healer</h5>
                        <p class="text-muted mb-4">Lynette Noni</p>
                        <div class="d-flex justify-content-between">
                            <p>Progress</p>
                            <p>90%</p>
                        </div>
                        <div class="progress">
                            <div class="progress-bar" style="width: 90%;"></div>
                        </div>
                        <p class="mt-2 text-muted" style="font-size: small;">Page 405 of 448</p>
                        <button class="btn btn-primary btn-sm">Update Progress</button>
                    </div>
                </div>
            </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                <div class="row align-items-start rounded p-3 h-100">
                    <div class="col-4 text-center">
                        <div class="book-card"></div>
                    </div>
                    <div class="col-8">
                        <h5 class="mb-1">One Dark Window</h5>
                        <p class="text-muted mb-4">Rachel Gillig</p>
                        <div class="d-flex justify-content-between">
                            <p>Progress</p>
                            <p>65%</p>
                        </div>
                        <div class="progress">
                            <div class="progress-bar" style="width: 65%;"></div>
                        </div>
                        <p class="mt-2 text-muted" style="font-size: small;">Page 280 of 432</p>
                        <button class="btn btn-primary btn-sm">Update Progress</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
