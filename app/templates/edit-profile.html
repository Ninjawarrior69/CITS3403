<!doctype html>
<html lang="en">
  <head>
    <title>Edit Profile</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}" />
  </head>
  <body>
    {% include "navbar.html" %}

    <div class="page-container py-5">
      <h2>Edit Profile</h2>
      <hr><br />
      <div class="row">
        <div class="col-md-4">
          <!-- Edit Image -->
          <div class="mini-profile-pic-placeholder mx-auto"></div>
          <!-- Details -->
          <form method="POST" action="{{ url_for('edit_profile') }}" class="profile-form mt-4 text-start">
            <label>Name</label>
            <input name="name" value="{{ current_user.name }}" class="form-control mb-3" />
            <label>Username</label>
            <input name="username" value="{{ current_user.username }}" class="form-control mb-3" />
            <label>Bio</label>
            <textarea name="bio" class="form-control mb-3">{{ current_user.bio }}</textarea>
            <label>Email Address</label>
            <input name="email" value="{{ current_user.email }}" class="form-control mb-3" />
            <button type="submit" class="btn btn-primary btn-sm mt-3">Save Changes</button>
          </form>
        </div>
        <div class="col-md-5 ms-auto">
          <!-- Favourite Books -->
          <div>
            <label class="mb-2">Favourite Books</label>
            <div class="books-grid">
              <div class="mini-book-card-edit"></div>
              <div class="mini-book-card-edit"></div>
              <div class="mini-book-card-edit"></div>
              <div class="mini-book-card-edit"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/search_suggestions.js') }}"></script>
  </body>
</html>
