<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link rel="stylesheet" href="../static/css/style.css?v=20260330" />
    <link rel="stylesheet" href="../static/css/login.css">
  </head>
  <body class="auth-page">
    <main
      class="container py-5 min-vh-100 d-flex align-items-center justify-content-center primary-yellow-bg"
    >
      <section class="auth-card card shadow-sm w-50 mx-auto primary-green-bg">
        <div class="card-body p-4 p-md-5">
          <div class="heading">
                <h3><a class="site-name" href="{{ url_for('home') }}">BookWorm</a></h3>
                <p style="color:#6B5D56">Sign up to track your reading journey!</p>
            </div><br>
          <nav class="nav nav-fill auth-tabs login-box" aria-label="Authentication pages">
            <a class="nav-link signup-left" href="{{ url_for('login') }}">Sign In</a>
            <a class="nav-link active signup-right" href="{{ url_for('signup') }}" aria-current="page">Sign Up</a>
          </nav>

          <h1 class="visually-hidden">Create Account</h1>
          <br>
          <form class="d-grid gap-3" action="#" method="post">
            <div>
              <label class="form-label" for="signup-username">Username</label>
              <input
                class="form-control w-100"
                id="signup-username"
                type="text"
                name="username"
                placeholder="Choose a username"
                autocomplete="username"
                required
              />
            </div>

            <div class="mt-2">
              <label class="form-label" for="signup-email">Email</label>
              <input
                class="form-control w-100"
                id="signup-email"
                type="email"
                name="email"
                placeholder="Enter your email"
                autocomplete="email"
                required
              />
            </div>

            <div class="mt-2">
              <label class="form-label" for="signup-password">Password</label>
              <input
                class="form-control w-100"
                id="signup-password"
                type="password"
                name="password"
                placeholder="Create a password"
                autocomplete="new-password"
                required
              />
            </div>

            <div class="mt-2">
              <label class="form-label" for="signup-password">Confirm Password</label>
              <input
                class="form-control w-100"
                id="signup-confirm-password"
                type="password"
                name="confirm-password"
                placeholder="Re-enter password"
                autocomplete="confirm-password"
                required
              />
            </div>
            <button class="btn btn-primary btn-md w-100 auth-submit mt-3" type="submit">
              Create Account
            </button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
