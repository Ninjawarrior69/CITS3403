<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=20260330"
    />
    <link rel="stylesheet" href="../static/css/style.css?v=20260330" />
  </head>
  <body class="auth-page">
    {% include "navbar.html" %}

    <main
      class="container py-4 min-vh-100 d-flex align-items-center justify-content-center primary-yellow-bg"
    >
      <section class="auth-card card shadow-sm w-50 mx-auto primary-green-bg">
        <div class="card-body p-4 p-md-5">
          <nav class="nav nav-fill auth-tabs" aria-label="Authentication pages">
            <a class="nav-link" href="{{ url_for('login') }}">Sign In</a>
            <a
              class="nav-link active"
              href="{{ url_for('signup') }}"
              aria-current="page"
              >Sign Up</a
            >
          </nav>

          <h1 class="visually-hidden">Create Account</h1>

          <form class="d-grid gap-3" action="#" method="post">
            <div>
              <label class="form-label" for="signup-username">Username</label>
              <input
                class="form-control form-control-lg"
                id="signup-username"
                type="text"
                name="username"
                placeholder="Choose a username"
                autocomplete="username"
                required
              />
            </div>

            <div>
              <label class="form-label" for="signup-email">Email</label>
              <input
                class="form-control form-control-lg"
                id="signup-email"
                type="email"
                name="email"
                placeholder="Enter your email"
                autocomplete="email"
                required
              />
            </div>

            <div>
              <label class="form-label" for="signup-password">Password</label>
              <input
                class="form-control form-control-lg"
                id="signup-password"
                type="password"
                name="password"
                placeholder="Create a password"
                autocomplete="new-password"
                required
              />
            </div>

            <button class="btn btn-lg w-100 auth-submit" type="submit">
              Create Account
            </button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
